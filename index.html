<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piss With Friends</title>
  <style>
    :root {
      --yellow:     #f5c800;
      --yellow-dark:#c9a200;
      --yellow-pale:#fff9d6;
      --blue:       #1a6fb5;
      --blue-dark:  #104e85;
      --bg:         #0d1b2a;
      --panel:      #132336;
      --panel2:     #1b3050;
      --text:       #f0f4f8;
      --muted:      #7a99bb;
      --border:     #1e3a55;
      --gold:       #ffd700;
      --silver:     #c0c0c0;
      --bronze:     #cd7f32;
      --red:        #e05555;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      width: 100%;
      background: linear-gradient(135deg, #0a1520 0%, #132336 100%);
      border-bottom: 2px solid var(--yellow);
      padding: 18px 24px 14px;
      text-align: center;
    }
    header h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      color: var(--yellow);
      text-shadow: 0 0 18px rgba(245,200,0,.45);
    }
    header h1 span { color: #fff; }
    #date-display {
      font-size: .85rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Main layout ─────────────────────────────────────────── */
    main {
      width: 100%;
      max-width: 560px;
      padding: 24px 16px 48px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Cards ───────────────────────────────────────────────── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 20px;
    }
    .card-title {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Setup screen ────────────────────────────────────────── */
    #setup-screen { text-align: center; }
    #setup-screen p {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    #setup-screen input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--panel2);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 12px;
    }
    #setup-screen input:focus { border-color: var(--yellow); }
    #setup-screen input::placeholder { color: var(--muted); }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .1s, box-shadow .1s, background .15s;
    }
    .btn:active { transform: scale(.96); }
    .btn-primary {
      background: var(--yellow);
      color: #0d1b2a;
      box-shadow: 0 4px 18px rgba(245,200,0,.35);
      width: 100%;
    }
    .btn-primary:hover { background: var(--yellow-dark); }
    .btn-primary:disabled {
      background: #3a4a5a;
      color: var(--muted);
      box-shadow: none;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: .8rem;
      padding: 6px 14px;
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--muted); }

    /* ── Auth screen ─────────────────────────────────────────── */
    #auth-screen { text-align: center; }
    #auth-tabs {
      display: flex;
      margin-bottom: 18px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      background: var(--panel2);
      color: var(--muted);
      border: none;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .auth-tab.active { background: var(--yellow); color: #0d1b2a; }
    #auth-screen input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--panel2);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 10px;
      display: block;
    }
    #auth-screen input:focus { border-color: var(--yellow); }
    #auth-screen input::placeholder { color: var(--muted); }
    .auth-error {
      background: rgba(224,85,85,.12);
      border: 1px solid var(--red);
      color: var(--red);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: .85rem;
      margin-bottom: 12px;
      text-align: left;
      display: none;
    }
    #auth-hint {
      font-size: .8rem;
      color: var(--muted);
      margin-top: 10px;
    }
    #auth-hint a { color: var(--yellow); text-decoration: none; }

    /* ── Pee button ──────────────────────────────────────────── */
    #pee-card { text-align: center; }
    #pee-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 35% 35%, #ffe566, var(--yellow), var(--yellow-dark));
      color: #0d1b2a;
      font-size: 2.8rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 0 6px rgba(245,200,0,.15), 0 8px 32px rgba(245,200,0,.4);
      transition: transform .12s, box-shadow .12s;
      position: relative;
      margin: 6px auto 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    #pee-btn .btn-label {
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    #pee-btn:hover:not(:disabled) {
      transform: scale(1.06);
      box-shadow: 0 0 0 10px rgba(245,200,0,.2), 0 12px 40px rgba(245,200,0,.5);
    }
    #pee-btn:active:not(:disabled) { transform: scale(.97); }
    #pee-btn:disabled {
      background: #2a3a4a;
      color: #4a6a8a;
      box-shadow: none;
      cursor: not-allowed;
    }

    #my-count {
      font-size: 2rem;
      font-weight: 900;
      color: var(--yellow);
    }
    #my-count-label { font-size: .8rem; color: var(--muted); margin-top: 2px; }

    /* ── Cooldown ────────────────────────────────────────────── */
    #cooldown-box {
      background: rgba(26,111,181,.15);
      border: 1px solid rgba(26,111,181,.35);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: .85rem;
      color: var(--muted);
      display: none;
      text-align: center;
    }
    #cooldown-box.active { display: block; }
    #cooldown-timer { font-weight: 700; color: var(--blue); font-size: 1rem; }

    /* ── Flash message ───────────────────────────────────────── */
    #flash {
      background: rgba(245,200,0,.12);
      border: 1px solid var(--yellow);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: .9rem;
      color: var(--yellow);
      text-align: center;
      display: none;
      animation: fadeIn .3s ease;
    }
    #flash.visible { display: block; }
    #flash.error { background: rgba(224,85,85,.12); border-color: var(--red); color: var(--red); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Leaderboard ─────────────────────────────────────────── */
    #leaderboard-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    #leaderboard-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--panel2);
      border-radius: 10px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      transition: background .15s;
    }
    #leaderboard-list li.is-me {
      border-color: rgba(245,200,0,.4);
      background: rgba(245,200,0,.06);
    }

    .rank {
      font-size: .95rem;
      font-weight: 900;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .rank-1 { color: var(--gold); }
    .rank-2 { color: var(--silver); }
    .rank-3 { color: var(--bronze); }
    .rank-n { color: var(--muted); font-size: .85rem; }

    .lb-name {
      flex: 1;
      font-weight: 600;
      font-size: .95rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .lb-you {
      font-size: .7rem;
      background: var(--yellow);
      color: #0d1b2a;
      border-radius: 5px;
      padding: 1px 6px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .lb-count {
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--yellow);
      flex-shrink: 0;
    }
    .lb-empty {
      color: var(--muted);
      font-size: .9rem;
      text-align: center;
      padding: 16px 0;
    }

    /* ── Footer strip ────────────────────────────────────────── */
    #user-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    #user-strip .uname {
      font-size: .85rem;
      color: var(--muted);
    }
    #user-strip .uname strong { color: var(--text); }

    /* ── Loading ─────────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99;
      flex-direction: column;
      gap: 16px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--yellow);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--muted); font-size: .9rem; }

    /* ── Color picker ────────────────────────────────────────── */
    #color-picker { margin: 18px 0 6px; text-align: center; }
    .color-picker-label {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .color-swatches {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .color-swatch-wrap { text-align: center; }
    .color-swatch {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 3px solid transparent;
      cursor: pointer;
      display: block;
      transition: transform .12s, border-color .12s, box-shadow .12s;
    }
    .color-swatch:hover { transform: scale(1.12); }
    .color-swatch.selected {
      border-color: #fff;
      box-shadow: 0 0 0 2px var(--yellow), 0 4px 14px rgba(0,0,0,.5);
      transform: scale(1.1);
    }
    .swatch-label {
      font-size: .62rem;
      color: var(--muted);
      margin-top: 5px;
      line-height: 1.2;
    }
    #hydration-hint {
      font-size: .82rem;
      margin-top: 12px;
      min-height: 1.3em;
      font-weight: 600;
      transition: color .2s;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 400px) {
      #pee-btn { width: 130px; height: 130px; font-size: 2.2rem; }
      .color-swatch { width: 38px; height: 38px; }
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
  <p>Connecting...</p>
</div>

<!-- Header -->
<header>
  <h1>&#128688; Piss <span>With</span> Friends</h1>
  <div id="date-display"></div>
</header>

<main id="app" style="display:none;">

  <!-- Auth screen — login / register -->
  <div class="card" id="auth-screen">
    <div id="auth-tabs">
      <button class="auth-tab active" id="tab-login">Log In</button>
      <button class="auth-tab" id="tab-register">Register</button>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <input type="text"     id="auth-username"    maxlength="30" placeholder="Username"                          autocomplete="username"         />
    <input type="password" id="auth-password"    maxlength="64" placeholder="Password (min 6 characters)"      autocomplete="current-password" />
    <input type="text"     id="auth-displayname" maxlength="20" placeholder="Display name (e.g. SpeedPeecer)"  autocomplete="off" style="display:none;" />
    <button class="btn btn-primary" id="auth-submit-btn">Log In</button>
    <p id="auth-hint">No account? <a href="#" id="auth-switch-link">Register</a></p>
  </div>

  <!-- Setup / display name entry -->
  <div class="card" id="setup-screen" style="display:none;">
    <div class="card-title">Display Name</div>
    <p>Choose a display name to appear on the leaderboard.<br>This can be changed at any time.</p>
    <input type="text" id="name-input" maxlength="20" placeholder="Your name (e.g. SpeedPeecer)" autocomplete="off" />
    <button class="btn btn-primary" id="save-name-btn">Join the Game</button>
  </div>

  <!-- Main pee card -->
  <div class="card" id="pee-card" style="display:none;">
    <div id="user-strip">
      <span class="uname">Playing as <strong id="display-name-label"></strong></span>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-secondary" id="change-name-btn">Rename</button>
        <button class="btn btn-secondary" id="signout-btn">Sign Out</button>
      </div>
    </div>

    <div style="height:1px;background:var(--border);margin:14px 0;"></div>

    <div style="text-align:center;">
      <button id="pee-btn">
        <span>&#128688;</span>
        <span class="btn-label">I Peed!</span>
      </button>

      <div id="my-count">0</div>
      <div id="my-count-label">pees today</div>
    </div>

    <div id="color-picker">
      <div class="color-picker-label">Urine color?</div>
      <div class="color-swatches" id="color-swatches"></div>
      <div id="hydration-hint"></div>
    </div>

    <div style="height:10px;"></div>
    <div id="cooldown-box">
      Next pee available in <span id="cooldown-timer">30:00</span>
    </div>
    <div style="height:6px;"></div>
    <div id="flash"></div>
  </div>

  <!-- Leaderboard -->
  <div class="card" id="lb-card" style="display:none;">
    <div class="card-title">Today's Leaderboard</div>
    <ul id="leaderboard-list">
      <li class="lb-empty">No pees logged yet today.</li>
    </ul>
  </div>

</main>

<!-- Firebase SDKs (compat) -->
<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
// ── Constants ────────────────────────────────────────────────
const COOLDOWN_MS = 30 * 60 * 1000; // 30 minutes

const PEE_COLORS = [
  { id: 'clear',       hex: '#d4f5c0', label: 'Clear',       hint: 'Over-hydrated — ease up on water!',        hintColor: '#7bcf7b' },
  { id: 'pale',        hex: '#f5f0a0', label: 'Pale Straw',  hint: 'Very well hydrated. Keep it up!',          hintColor: '#b8d46a' },
  { id: 'yellow',      hex: '#f5c800', label: 'Yellow',      hint: 'Normal. Good hydration.',                  hintColor: '#f5c800' },
  { id: 'dark-yellow', hex: '#d4940a', label: 'Dark Yellow', hint: 'Slightly dehydrated. Grab some water.',    hintColor: '#d4940a' },
  { id: 'amber',       hex: '#b8650b', label: 'Amber',       hint: 'Dehydrated! Drink water soon.',            hintColor: '#e07030' },
  { id: 'brown',       hex: '#7a3b10', label: 'Brown',       hint: 'Very dehydrated. Drink water now!',        hintColor: '#e05555' },
];

// ── Firebase init ─────────────────────────────────────────────
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.database();

// ── State ─────────────────────────────────────────────────────
let currentUid  = null;
let displayName = null;
let cooldownInterval = null;
let selectedColor = null;
let leaderboardSubscribed = false;

// ── Helpers ───────────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

function showFlash(msg, isError = false) {
  const el = document.getElementById('flash');
  el.textContent = msg;
  el.className = 'visible' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 3500);
}

// ── Cooldown management ───────────────────────────────────────
function getRemainingCooldown() {
  const last = parseInt(localStorage.getItem('pwf_lastPee') || '0', 10);
  if (!last) return 0;
  const elapsed = Date.now() - last;
  return Math.max(0, COOLDOWN_MS - elapsed);
}

function startCooldownUI(remainingMs) {
  const box   = document.getElementById('cooldown-box');
  const timer = document.getElementById('cooldown-timer');
  const btn   = document.getElementById('pee-btn');

  clearInterval(cooldownInterval);

  if (remainingMs <= 0) {
    box.classList.remove('active');
    btn.disabled = false;
    return;
  }

  btn.disabled = true;
  box.classList.add('active');

  function tick() {
    const rem = getRemainingCooldown();
    if (rem <= 0) {
      clearInterval(cooldownInterval);
      box.classList.remove('active');
      btn.disabled = false;
      timer.textContent = '0:00';
      return;
    }
    const m = Math.floor(rem / 60000);
    const s = Math.floor((rem % 60000) / 1000);
    timer.textContent = `${m}:${String(s).padStart(2,'0')}`;
  }
  tick();
  cooldownInterval = setInterval(tick, 1000);
}

// ── Color picker ──────────────────────────────────────────────
function initColorPicker() {
  const container = document.getElementById('color-swatches');
  PEE_COLORS.forEach(c => {
    const wrap = document.createElement('div');
    wrap.className = 'color-swatch-wrap';

    const btn = document.createElement('button');
    btn.className = 'color-swatch';
    btn.style.background = c.hex;
    btn.title = c.label;
    btn.dataset.colorId = c.id;
    btn.setAttribute('aria-label', c.label);
    btn.addEventListener('click', () => pickColor(c));

    const lbl = document.createElement('div');
    lbl.className = 'swatch-label';
    lbl.textContent = c.label;

    wrap.appendChild(btn);
    wrap.appendChild(lbl);
    container.appendChild(wrap);
  });
}

function pickColor(c) {
  selectedColor = c;
  document.querySelectorAll('.color-swatch').forEach(s =>
    s.classList.toggle('selected', s.dataset.colorId === c.id)
  );
  const hint = document.getElementById('hydration-hint');
  hint.textContent = c.hint;
  hint.style.color = c.hintColor;
}

function resetColorPicker() {
  selectedColor = null;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  const hint = document.getElementById('hydration-hint');
  hint.textContent = '';
  hint.style.color = '';
}

// ── Leaderboard rendering ─────────────────────────────────────
function renderLeaderboard(snapshot) {
  const list = document.getElementById('leaderboard-list');
  const data = snapshot.val();

  if (!data) {
    list.innerHTML = '<li class="lb-empty">No pees logged yet today. Be first!</li>';
    return;
  }

  const entries = Object.entries(data)
    .map(([uid, v]) => ({ uid, name: v.name || 'Unknown', count: v.count || 0 }))
    .sort((a, b) => b.count - a.count);

  const medals = ['&#127947;', '&#129352;', '&#129353;'];
  const rankClass = ['rank-1','rank-2','rank-3'];

  list.innerHTML = entries.map((e, i) => {
    const isMe = e.uid === currentUid;
    const rankIcon = i < 3 ? medals[i] : `${i+1}`;
    const rankCls  = i < 3 ? rankClass[i] : 'rank-n';
    return `
      <li class="${isMe ? 'is-me' : ''}">
        <span class="rank ${rankCls}">${rankIcon}</span>
        <span class="lb-name">${escapeHtml(e.name)}</span>
        ${isMe ? '<span class="lb-you">YOU</span>' : ''}
        <span class="lb-count">${e.count} &#128688;</span>
      </li>`;
  }).join('');

  // Update my count display
  const me = entries.find(e => e.uid === currentUid);
  document.getElementById('my-count').textContent = me ? me.count : 0;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Subscribe to today's leaderboard ─────────────────────────
function subscribeLeaderboard() {
  if (leaderboardSubscribed) return;
  leaderboardSubscribed = true;
  db.ref(`leaderboard/${todayKey()}`).on('value', renderLeaderboard);
}

function unsubscribeLeaderboard() {
  db.ref(`leaderboard/${todayKey()}`).off('value', renderLeaderboard);
  leaderboardSubscribed = false;
}

// ── Log a pee ─────────────────────────────────────────────────
async function logPee() {
  if (!currentUid) return;

  // Color required
  if (!selectedColor) {
    showFlash('Pick a color first!', true);
    return;
  }

  // Client-side cooldown gate
  const rem = getRemainingCooldown();
  if (rem > 0) {
    const m = Math.floor(rem / 60000);
    const s = Math.floor((rem % 60000) / 1000);
    showFlash(`Hold it! Cooldown: ${m}:${String(s).padStart(2,'0')} remaining.`, true);
    return;
  }

  const btn = document.getElementById('pee-btn');
  btn.disabled = true;

  try {
    const today   = todayKey();
    const userRef = db.ref(`leaderboard/${today}/${currentUid}`);

    // Read current server value to prevent race conditions
    const snap = await userRef.get();
    const serverData = snap.val();
    const now = Date.now();

    // Server-side cooldown check
    if (serverData && serverData.lastPee) {
      const elapsed = now - serverData.lastPee;
      if (elapsed < COOLDOWN_MS) {
        const remMs = COOLDOWN_MS - elapsed;
        localStorage.setItem('pwf_lastPee', String(now - elapsed));
        startCooldownUI(remMs);
        showFlash('Cooldown detected on server. Syncing...', true);
        return;
      }
    }

    const newCount = (serverData?.count || 0) + 1;
    await userRef.set({
      name:    displayName,
      count:   newCount,
      lastPee: now,
      lastColor: selectedColor.id
    });

    // Save cooldown timestamp locally
    localStorage.setItem('pwf_lastPee', String(now));
    startCooldownUI(COOLDOWN_MS);
    showFlash(`Logged! ${selectedColor.hint}`);
    resetColorPicker();

  } catch (err) {
    console.error(err);
    showFlash('Error saving — check your connection.', true);
    btn.disabled = false;
  }
}

// ── Auth ──────────────────────────────────────────────────────
function usernameToEmail(u) {
  return u.toLowerCase().trim() + '@pwf.local';
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function switchAuthTab(tab) {
  const isReg = tab === 'register';
  document.getElementById('tab-login').classList.toggle('active', !isReg);
  document.getElementById('tab-register').classList.toggle('active', isReg);
  document.getElementById('auth-displayname').style.display = isReg ? '' : 'none';
  document.getElementById('auth-submit-btn').textContent = isReg ? 'Create Account' : 'Log In';
  document.getElementById('auth-hint').style.display = isReg ? 'none' : '';
  document.getElementById('auth-password').autocomplete = isReg ? 'new-password' : 'current-password';
  document.getElementById('auth-error').style.display = 'none';
}

async function handleAuthSubmit() {
  const username = document.getElementById('auth-username').value.trim().toLowerCase();
  const password = document.getElementById('auth-password').value;
  const isReg    = document.getElementById('tab-register').classList.contains('active');
  const dispRaw  = document.getElementById('auth-displayname').value.trim();

  document.getElementById('auth-error').style.display = 'none';

  if (!username)         { showAuthError('Username is required.'); return; }
  if (username.length < 3) { showAuthError('Username must be at least 3 characters.'); return; }
  if (!/^[a-z0-9_]+$/.test(username)) { showAuthError('Username may only contain letters, numbers, and underscores.'); return; }
  if (!password || password.length < 6) { showAuthError('Password must be at least 6 characters.'); return; }
  if (isReg && !dispRaw) { showAuthError('Display name is required.'); return; }

  const btn = document.getElementById('auth-submit-btn');
  btn.disabled = true;

  try {
    if (isReg) {
      const cred = await auth.createUserWithEmailAndPassword(usernameToEmail(username), password);
      await db.ref(`users/${cred.user.uid}/name`).set(dispRaw.slice(0, 20));
    } else {
      await auth.signInWithEmailAndPassword(usernameToEmail(username), password);
    }
    // onAuthStateChanged takes it from here
  } catch (err) {
    btn.disabled = false;
    const msgs = {
      'auth/user-not-found':       'No account with that username.',
      'auth/wrong-password':       'Incorrect password.',
      'auth/invalid-credential':   'Incorrect username or password.',
      'auth/email-already-in-use': 'That username is already taken.',
      'auth/weak-password':        'Password must be at least 6 characters.',
      'auth/too-many-requests':    'Too many attempts. Try again later.',
    };
    showAuthError(msgs[err.code] || `Error: ${err.message}`);
  }
}

async function handleSignOut() {
  clearInterval(cooldownInterval);
  unsubscribeLeaderboard();
  currentUid  = null;
  displayName = null;
  localStorage.removeItem('pwf_name');
  localStorage.removeItem('pwf_lastPee');
  resetColorPicker();

  document.getElementById('pee-card').style.display     = 'none';
  document.getElementById('lb-card').style.display      = 'none';
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display  = '';
  document.getElementById('auth-error').style.display   = 'none';
  document.getElementById('auth-username').value = '';
  document.getElementById('auth-password').value = '';
  switchAuthTab('login');

  await auth.signOut();
}

// ── Name management ───────────────────────────────────────────
function showSetup() {
  document.getElementById('auth-screen').style.display  = 'none';
  document.getElementById('setup-screen').style.display = '';
  document.getElementById('pee-card').style.display     = 'none';
  document.getElementById('lb-card').style.display      = 'none';
  document.getElementById('name-input').value = displayName || '';
  document.getElementById('name-input').focus();
}

async function saveName() {
  const raw = document.getElementById('name-input').value.trim();
  if (!raw) { showFlash('Please enter a name.', true); return; }

  displayName = raw.slice(0, 20);
  localStorage.setItem('pwf_name', displayName);

  if (currentUid) {
    await db.ref(`users/${currentUid}/name`).set(displayName);
    const today = todayKey();
    const snap = await db.ref(`leaderboard/${today}/${currentUid}`).get();
    if (snap.exists()) {
      await db.ref(`leaderboard/${today}/${currentUid}/name`).set(displayName);
    }
  }

  showApp();
}

function showApp() {
  document.getElementById('auth-screen').style.display  = 'none';
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('pee-card').style.display     = '';
  document.getElementById('lb-card').style.display      = '';
  document.getElementById('display-name-label').textContent = displayName;
}

// ── Boot ──────────────────────────────────────────────────────
document.getElementById('date-display').textContent = formatDate(new Date());
initColorPicker();

document.getElementById('pee-btn').addEventListener('click', logPee);

document.getElementById('save-name-btn').addEventListener('click', saveName);
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveName();
});

document.getElementById('change-name-btn').addEventListener('click', showSetup);
document.getElementById('signout-btn').addEventListener('click', handleSignOut);
document.getElementById('auth-submit-btn').addEventListener('click', handleAuthSubmit);
document.getElementById('tab-login').addEventListener('click', () => switchAuthTab('login'));
document.getElementById('tab-register').addEventListener('click', () => switchAuthTab('register'));
document.getElementById('auth-switch-link').addEventListener('click', e => { e.preventDefault(); switchAuthTab('register'); });
document.getElementById('auth-username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('auth-password').focus(); });
document.getElementById('auth-password').addEventListener('keydown', e => { if (e.key === 'Enter') handleAuthSubmit(); });
document.getElementById('auth-displayname').addEventListener('keydown', e => { if (e.key === 'Enter') handleAuthSubmit(); });

auth.onAuthStateChanged(async user => {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display     = 'flex';

  if (!user) {
    currentUid  = null;
    displayName = null;
    document.getElementById('auth-screen').style.display  = '';
    document.getElementById('pee-card').style.display     = 'none';
    document.getElementById('lb-card').style.display      = 'none';
    document.getElementById('setup-screen').style.display = 'none';
    return;
  }

  currentUid = user.uid;
  document.getElementById('auth-screen').style.display = 'none';

  // Load display name from RTDB (source of truth across devices)
  const snap = await db.ref(`users/${currentUid}/name`).get();
  if (snap.exists()) {
    displayName = snap.val();
    localStorage.setItem('pwf_name', displayName);
  } else {
    displayName = localStorage.getItem('pwf_name') || null;
  }

  subscribeLeaderboard();
  startCooldownUI(getRemainingCooldown());

  if (!displayName) {
    showSetup();
  } else {
    showApp();
  }
});
</script>
